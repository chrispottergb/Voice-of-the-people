workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 120
    environment:
      node: 18.20.4
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.voiceofthepeople.app
      vars:
        EXPO_PUBLIC_SUPABASE_URL: https://ywjrrppeozvktvkpatmc.supabase.co
        BUNDLE_ID: com.voiceofthepeople.app
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Fix del module compatibility
        script: |
          npm install del@6 --no-save
      - name: Expo Prebuild
        script: |
          npx expo prebuild --platform ios --clean
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace ios/voiceofthepeople.xcworkspace \
            --scheme voiceofthepeople
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  android-apk:
    name: Android APK
    max_build_duration: 60
    environment:
      node: 18.20.4
      vars:
        EXPO_PUBLIC_SUPABASE_URL: https://ywjrrppeozvktvkpatmc.supabase.co
        EXPO_PUBLIC_SUPABASE_ANON_KEY: $EXPO_PUBLIC_SUPABASE_ANON_KEY
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Fix del module compatibility
        script: |
          npm install del@6 --no-save
      - name: Expo Prebuild
        script: |
          npx expo prebuild --platform android --clean
      - name: Build APK
        script: |
          cd android && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk

  android-aab:
    name: Android AAB (Google Play)
    max_build_duration: 60
    environment:
      node: 18.20.4
      android_signing:
        - voiceofthepeople
      vars:
        EXPO_PUBLIC_SUPABASE_URL: https://ywjrrppeozvktvkpatmc.supabase.co
        EXPO_PUBLIC_SUPABASE_ANON_KEY: $EXPO_PUBLIC_SUPABASE_ANON_KEY
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Fix del module compatibility
        script: |
          npm install del@6 --no-save
      - name: Expo Prebuild
        script: |
          npx expo prebuild --platform android --clean
      - name: Build AAB
        script: |
          cd android && ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
